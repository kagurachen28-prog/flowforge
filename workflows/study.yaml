name: study
description: 学习循环 — 观察 agent 生态动向，深入研究项目，校准我们的方向

start: align

nodes:
  align:
    task: |
      **读准则**：cat ~/.openclaw/workspace/wiki/study/guide.md
      理解学习方向和原则。然后读 TODO.md「📚 学习」section，看有没有指定任务。
    branches:
      - condition: TODO 有指定学习任务
        next: todo_task
      - condition: 没有指定任务，自选模式
        next: entry

  todo_task:
    task: |
      执行 TODO 里指定的学习任务。做完后删掉该 TODO 条目。
      汇报学习结果。
    next: note

  entry:
    task: |
      选择本轮学习模式（**不允许空转**，每轮必须有产出）：
      1. **侦察**：找新项目、新趋势、新方向（适合距上次侦察 ≥3 天）
      2. **快速扫描**：10 分钟 GitHub trending + HN 速览，只记标题和一句话判断（适合日常保持手感）
      3. **跟进**：已关注项目有没有新动态
      4. **应用**：把之前学到的东西用在自己身上（改工具、改流程、验证假设）

      **决策辅助**：先跑 `bash ~/.openclaw/workspace/tools/study-saturation.sh`，一条命令看清饱和状态和推荐模式。
      脚本输出 locked/open 状态 + 智能推荐（含周末降级逻辑），不需要手动 grep 3-4 次。
      - 连续侦察 2 次以上 → 优先选应用或跟进
      - 连续应用 2 次以上 → 优先选侦察或跟进
      - 不确定 → 快速扫描是最安全的选择

      **⛔ 饱和上限（硬性规则）**：
      - 同一天 quick_scout ≥ 3 次 → **禁止再选快速扫描**。只能选应用或跟进。
        检查方法：`grep -c "quick_scout\|quick_scan\|Quick Scan\|Quick Scout" ~/.openclaw/workspace/memory/$(date +%Y-%m-%d).md`
        ≥ 3 → 锁定。不允许用"这次不同"合理化第 4 次。
      - 连续 2 天每天 ≥3 次 quick scan → 生态确认稳定期，降频到每天 max 1 次 quick scan，其余走 apply
      - 同一天 apply ≥ 3 次 → **禁止再选应用**。只能选侦察或跟进。
        检查方法：`grep -c "^## Study Apply\|^## Study.*Apply" ~/.openclaw/workspace/memory/$(date +%Y-%m-%d).md`
        ≥ 3 → 锁定。原理：apply 收益递减明显——前 2 次通常有实质改动，第 3 次开始找「能应用的东西」本身就是强迫行为。
      - 同一天 scout（侦察 + 快速扫描合计）≥ 3 次 → **禁止再选侦察或快速扫描**。只能选应用或跟进。
        检查方法：`grep -c "Scout\|scout\|quick_scout\|Quick Scan" ~/.openclaw/workspace/memory/$(date +%Y-%m-%d).md`
        ≥ 3 → 锁定。原理：同日多次侦察覆盖同一批新项目，收益接近零。
      - 同一天 followup ≥ 4 次 → **禁止再选跟进**。只能选侦察、快速扫描或应用。
        检查方法：`grep -c "^## Study Followup\|^## Study.*Followup\|^## Study.*Follow" ~/.openclaw/workspace/memory/$(date +%Y-%m-%d).md`
        ≥ 4 → 锁定。原理：同日对同一 portfolio 反复检查，第 4 次起边际收益接近零（05-14 实证：24 次 study 中 7+ 次 followup，后期全部无新信号）。
      - **周末降级**（周六日）：followup 低信号（多数项目周末不活跃），优先选 apply 或 scout。
        如果选 followup，只做到期项目，不扩展。
      - **全部锁定**：scout ≥3 AND apply ≥3 AND followup ≥4 → **本轮直接结束**。不强迫进入任何模式。
        记录到 memory：「Study 全模式饱和，跳过」。
    branches:
      - condition: "侦察新东西"
        next: scout
      - condition: "快速扫描"
        next: quick_scout
      - condition: "跟进已关注项目"
        next: followup
      - condition: "应用已有知识"
        next: apply
      - condition: "全模式饱和，直接结束"
        next: reflect

  scout:
    task: |
      侦察 agent 生态的动向：
      0. **先搜已有知识**（不可跳过）：
         - `bash ~/.openclaw/workspace/wiki/search.sh "<本轮关键词>" --limit 5`（hybrid: semantic + keyword）
         - 搜到相关笔记就先读，避免重复研究已知项目
         ⛔ 借口"我已经知道这个项目了" → 知识衰减真实存在，上次的笔记可能有你忘了的细节
      1. 看 GitHub trending（AI/agent 相关）、HN、Twitter/X 上最近在讨论什么
         **优先用 GitHub API search**（`gh api search/repositories?q=topic:ai-agent+created:>YYYY-MM-DD&sort=stars`）比 scrape trending 页更可靠、可复现
      2. 已关注项目有没有大的方向变化（新 release、架构重构、重要讨论）
      3. 有没有新冒出来的项目或趋势
      4. 核心问题：**业界在做 agent 的什么？钱和注意力往哪里流？**
      5. 跟我们的直觉对比：我们感受到的问题（信任、贡献信誉等）是不是真问题？
      6. **看人**：有没有值得研究的高效贡献者？（高 merge rate、跨项目、特定模式）
      7. **饱和信号检测**：前 3 个搜索结果都已有 wiki 笔记 → 立即停止逐个搜索，
         切换为「趋势确认 + 星数更新」模式（更新已跟踪项目星数变化，写趋势级洞察而非找新项目）。
         这不是"没找到"——这本身是信号，说明生态处于整合/稳定期。
      **🚩 Red Flags — 如果出现以下症状，你在走形式不是在侦察：**
      - 列出 10+ 项目但每个只写一行判断 → 你在数量凑产出，不是在思考
      - 30 分钟过去了还在翻第 4 页搜索结果 → 你该停下来深入前 3 个而不是继续翻
      - 所有判断都是"不相关"/"已知" → 搜索词太窄或在无意识筛掉不舒服的信号
      - 没有一个项目让你感到意外 → 你只看了符合预期的东西
      汇报侦察结果。
    branches:
      - condition: "发现了值得深入研究的方向或项目"
        next: deep_read
      - condition: "发现了值得研究的贡献者"
        next: deep_read_contributor
      - condition: "没有新发现，跟进已关注项目"
        next: followup
      - condition: "什么都没有"
        next: reflect

  quick_scout:
    task: |
      10 分钟快速扫描，不求深入，只求广度：
      0. **先搜已有知识**：`bash ~/.openclaw/workspace/wiki/search.sh "agent trending" --limit 3`（hybrid search），跳过已有深度笔记的项目
      1. GitHub trending today（AI/agent 相关前 10）— 记项目名 + stars + 一句话
         **优先用 GitHub API search**（sort=stars, 按周过滤）比 web scrape 更稳定
      2. HN front page 扫一眼 — 有没有 agent 相关的讨论
      3. 每个发现只写一行判断："值得深入" / "已知" / "不相关"
      4. **饱和判断**：前 3 个结果都是"已知" → 停止扫描，直接写趋势总结（生态稳定期信号）
      5. 如果有 "值得深入" 的 → 记到 wiki/projects/backlog.md
      总耗时控制在 10 分钟内。汇报扫描结果。
    branches:
      - condition: "发现了值得深入研究的"
        next: deep_read
      - condition: "没发现新项目，转 reflect"
        next: reflect

  apply:
    task: |
      把之前学到的东西应用到自己身上：
      0. **先搜已有知识**：`bash ~/.openclaw/workspace/wiki/search.sh "<应用方向>" --limit 5`（hybrid search: semantic + keyword, mitigates RAG failure modes），找出相关卡片和笔记作为输入
      1. **先读 unapplied.md**：`cat ~/.openclaw/workspace/study/unapplied.md`——聚合的待应用洞察列表。再读 IDEAS.md 和最近的 memory 补充
      2. 选一个最值得应用的，具体执行：
         - 改工具代码（gogetajob、FlowForge、nudge）
         - 改工作流（study.yaml、workloop.yaml、reflect.yaml）
         - 验证一个假设（EXP 系列）
         - 把抽象洞察变成具体改动
      3. 做完之后验证：改了之后有什么不同？

      **🚩 Red Flags — 如果出现以下症状，你在自欺不是在应用：**
      - 选了最容易的洞察而不是最有价值的 → 你在避难就易
      - "应用"只是在文件里加了注释/文档 → 那是写笔记不是应用
      - 改完后说不出"跟改之前有什么不同" → 你做了但没验证
      - 改动不影响实际执行行为 → 你在 cosmetic refactor 不是 apply
      汇报应用了什么、效果如何。
    next: note

  followup:
    task: |
      跟进已关注项目的新动态：
      0. **先看组合健康**：`bash ~/.openclaw/workspace/study/tracking-health.sh` — 如果 auto-drop candidates > 5 或总量 > 40，先清理再跟进
      0a. **再查到期项目**：`bash ~/.openclaw/workspace/study/tracking-due.sh` 看哪些 tracking item 到了 revisit 日期
      0a2. **TTL 审计**：`bash ~/.openclaw/workspace/study/audit-targets.sh` — 检查 targets.md 主列表是否有超 TTL 的 stale 条目（scout 14d / following 21d / deep-dive 30d），有就顺手清理
      0a3. **活跃度预筛**：`bash ~/.openclaw/workspace/study/tracking-activity.sh --all` — 一条命令看哪些 tracked repo 有新 push（diff-scoped followup）。⚪ QUIET 的 repo 跳过不查，🟢 ACTIVE 的优先跟进。节省 API 调用和时间
      0b. **社区健康检查**：对要深入跟进的项目跑 `bash ~/.openclaw/workspace/study/tracking-community.sh <owner/repo>` — 看 issue 活跃度、外部 PR、贡献者多样性。用结果辅助判断是否值得继续跟踪（🔴 SOLO + 低星 → 考虑 drop）
      0c. **先搜已有知识**：对要跟进的项目 `bash ~/.openclaw/workspace/wiki/search.sh "<项目名>" --limit 5`（hybrid search），带着上次认知进入
      1. 优先跟进到期的 tracking items，其次读 wiki/projects/ 找活跃项目
      2. 选 2-3 个，检查最近变化：
         - 大的 PR 被 merge（架构重构、新 feature）
         - 重要的 issue 讨论（设计决策、方向争论）— **优先找批评性 issue**（architecture critiques 暴露架构假设比读源码更快）
         - 新的 release
      3. 有没有跟我们方向相关的新信号？
      汇报哪些项目有值得深入的新动态。
    branches:
      - condition: "有项目有值得学习的新动态"
        next: deep_read
      - condition: "没发现新动态，转 reflect"
        next: reflect

  deep_read:
    task: |
      深入阅读选中项目的代码和文档：
      0. **先读已有知识**（⚠️ 不可跳过，即使觉得已经知道）：
         ⛔ 借口"这个项目我刚看过" → 刚看过 ≠ 记得细节。30秒扫一眼不会浪费时间，但跳过可能重复研究
         - wiki/projects/项目名.md（如果有，带着上次的认知进入）
         - `bash ~/.openclaw/workspace/wiki/search.sh "<关键词>" --limit 5`（hybrid: semantic + keyword，覆盖 RAG 失效场景）
         - **backlink 扩展**：对命中的卡片跑 `cd ~/.openclaw/workspace/wiki && MEMEX_HOME=. memex backlinks <slug>`，沿链接读 1-2 个关联卡片
         - 找到相关笔记和卡片就先读，带着已有认知进入
      1. 如果是新项目：clone，读 README、架构文档、核心模块
      2. 如果是已关注项目：读新变化的代码，理解设计决策
      3. **先读 test 文件**：test/ 目录往往比文档更准确地展示 API 用法和边界
      4. **扫 Issues 找批评者**（⚠️ 高效捷径，不可跳过）：
         `gh issue list -R owner/repo --state all --limit 20 --json title,body,author,labels,comments`
         重点看：architecture critiques, design debates, bug reports that expose assumptions.
         一条高质量批评 = 数小时源码阅读。批评者指出的缺陷直接暴露架构假设和薄弱点。
         **Insight origin**: mirage/@eouzoe (05-09) — 5 条 issue 揭示了 credential isolation, session isolation,
         cache invalidation, snapshot fidelity, shell coverage 五个架构盲点，比读全部源码更快。
      5. 重点关注：
         - 这个项目在解决什么问题？为什么现在？
         - 架构模式（为什么这样设计？有什么 tradeoff？）
         - 跟 agent 生态的其他项目是什么关系？（竞争？互补？上下游？）
         - 跟我们的方向有什么关联？
      5. 带着问题读，不是漫无目的地浏览

      **🚩 Red Flags — 如果出现以下症状，你在浏览不是在深读：**
      - 笔记里大段引用 README 但没有自己的分析 → 你在搬运不是在理解
      - 没看过一个 test 文件 → 你只读了宣传材料
      - 写不出"跟我们方向的关联" → 你读完了但没思考
      - 花了 20 分钟但只看了 README 和目录结构 → 你该打开核心模块了
      汇报你的理解和发现。
    next: note

  deep_read_contributor:
    task: |
      深入研究一个高效贡献者的模式：
      1. 列出这个人最近的 merged PR（gh pr list --author X --state merged）
      2. 分析模式：
         - 选题策略：什么类型的 issue？bug fix / feature / test / docs / refactor？
         - PR 大小和周转时间：小而快 vs 大而慢？
         - 沟通方式：PR description 怎么写？怎么回应 review？
         - 跨项目还是深耕一个？
      3. 提炼可复用的策略：
         - 什么让他的 PR 容易被 merge？
         - 他是怎么选 issue 的？（label？最新？easy-first？）
         - 有没有我可以直接学的工作流？
      汇报分析结果。
    next: note

  note:
    task: |
      把学到的东西写进田野笔记：
      1. 新项目 → 在 wiki/projects/ 创建新文件
      2. 已有项目 → 追加新发现，不重复已有内容
      3. 写作要求：
         - 用 [[双链]] 引用相关笔记和 memex 卡片
         - 项目内：[[NemoClaw]] 引用 [[gitclaw]] 做对比
         - 跨系统：[[mechanism-vs-evolution]] 引用 memex 概念
         - 记这个项目在 agent 生态中的位置
         - 记跟我们方向的关联
         - 记架构洞察和反直觉的发现
      4. git commit && git push 到 kagura-agent/wiki
      汇报写了什么。

      **⛔ Anti-rationalization table — 不要跳过笔记：**
      | 借口 | 反驳 |
      |---|---|
      | "这轮没什么新的，不用写" | 没有新发现本身就是信号（生态稳定期、方向验证）。写 1 行趋势判断 |
      | "来不及了，先 reflect" | 笔记是 reflect 的输入。跳过笔记 = reflect 也变空 |
      | "已经在 memory 里写过了" | memory 是日志，wiki 是知识库。日志不替代结构化笔记 |
      | "只是小更新，不值得单独 commit" | 追加 3-5 行到已有文件 + commit 只要 30 秒 |
    next: reflect

  reflect:
    task: |
      用 Acontext distillation 结构化反思本轮学习：

      **⛔ Anti-rationalization table — 不要敷衍反思：**
      | 借口 | 反驳 |
      |---|---|
      | "这轮很顺利，没什么失败" | 没有失败 ≠ 没有可改进的。检查：有没有多余步骤？有没有更快的路径？ |
      | "失败分析写不出来" | 回看实际执行：哪步花了最多时间？哪步的产出最薄？那就是改进点 |
      | "飞轮更新没什么好改的" | 连续 3 轮说 "无需调整" → 说明你没认真看。至少验证一下 TODO 是否过期 |
      | "太累了，先提交再说" | 反思是学习的 50% 价值来源。跳过反思 = 这轮学习打五折 |

      **成功分析**（学到了什么）：
      - goal: 这轮学习要解决什么问题？
      - approach: 什么方法有效？
      - key_decisions: 哪些选择起了作用？
      - pattern: 可复用的模式是什么？
      - applies_when: 具体适用条件（项目、场景、前提）

      **失败分析**（哪里卡了）：
      - failure_point: 卡在哪？
      - flawed_reasoning: 错误假设是什么？
      - what_should_have_been_done: 正确做法
      - prevention_principle: 怎么防

      **沉淀分流**（三层，关键！）：
      - **项目级知识**（架构、API、维护者风格）→ wiki/projects/项目名.md
      - **跨项目/领域级知识**（理论、框架、跨项目对比、研究洞察）→ memex 卡片（带双向链接）
        写完后：cd ~/.openclaw/workspace/wiki && git add -A && git commit -m "card: 卡片名" && git push
        例：自进化四层模型、mechanism-vs-evolution、agent 信任问题的生态位
      - **学习方法 pattern**（跨领域通用的研究方式）→ beliefs-candidates.md
        例：读代码前先读 test、对比两个项目比单独看一个更有效
      不确定的先放 wiki。跨项目洞察必须写 memex——这是知识网络的核心节点。

      **方向影响**：
      - 验证了直觉？→ 记录证据
      - 推翻了假设？→ 记录并调整
      - 新的可能方向？→ 记录并评估

      记录到 memory/YYYY-MM-DD.md。

      **飞轮更新**（不可跳过）：
      1. 回顾 wiki/study/guide.md — 学习原则有没有要调整的？
      2. 回顾 wiki/study/study.yaml — 流程有没有卡的地方、多余的步骤？
      3. 更新 TODO.md「📚 学习」section — 新的学习任务加进去，做完的删掉
      有改动 → git commit + push
    next: done

  done:
    task: |
      本轮学习完成。汇报学到了什么，对方向判断有什么影响。
    terminal: true
