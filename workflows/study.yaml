name: study
description: 学习循环 — 观察 agent 生态动向，深入研究项目，校准我们的方向

start: scout

nodes:
  scout:
    task: |
      侦察 agent 生态的动向：
      1. 看 GitHub trending（AI/agent 相关）、HN、Twitter/X 上最近在讨论什么
      2. 已关注项目有没有大的方向变化（新 release、架构重构、重要讨论）
      3. 有没有新冒出来的项目或趋势
      4. 核心问题：**业界在做 agent 的什么？钱和注意力往哪里流？**
      5. 跟我们的直觉对比：我们感受到的问题（信任、贡献信誉等）是不是真问题？
      汇报侦察结果。
    branches:
      - condition: "发现了值得深入研究的方向或项目"
        next: deep_read
      - condition: "没有新发现，跟进已关注项目"
        next: followup
      - condition: "什么都没有"
        next: reflect

  followup:
    task: |
      跟进已关注项目的新动态：
      1. 读 field-notes/projects/ 目录，列出已有田野笔记的项目
      2. 选 2-3 个最活跃的，检查最近变化：
         - 大的 PR 被 merge（架构重构、新 feature）
         - 重要的 issue 讨论（设计决策、方向争论）
         - 新的 release
      3. 有没有跟我们方向相关的新信号？
      汇报哪些项目有值得深入的新动态。
    branches:
      - condition: "有项目有值得学习的新动态"
        next: deep_read
      - condition: "没什么新的"
        next: reflect

  deep_read:
    task: |
      深入阅读选中项目的代码和文档：
      1. 如果是新项目：clone，读 README、架构文档、核心模块
      2. 如果是已关注项目：读新变化的代码，理解设计决策
      3. 重点关注：
         - 这个项目在解决什么问题？为什么现在？
         - 架构模式（为什么这样设计？有什么 tradeoff？）
         - 跟 agent 生态的其他项目是什么关系？（竞争？互补？上下游？）
         - 跟我们的方向有什么关联？
      4. 带着问题读，不是漫无目的地浏览
      汇报你的理解和发现。
    next: note

  note:
    task: |
      把学到的东西写进田野笔记：
      1. 新项目 → 在 field-notes/projects/ 创建新文件
      2. 已有项目 → 追加新发现，不重复已有内容
      3. 写作要求：
         - 记这个项目在 agent 生态中的位置
         - 记跟我们方向的关联（验证了什么？推翻了什么？）
         - 记架构洞察和反直觉的发现
         - 记跟其他项目的对比
      4. git commit && git push 到 kagura-agent/field-notes
      汇报写了什么。
    next: reflect

  reflect:
    task: |
      反思本轮学习：
      1. 这轮学习对我们的方向判断有什么影响？
         - 验证了我们的直觉？→ 记录证据
         - 推翻了我们的假设？→ 记录并调整
         - 发现了新的可能方向？→ 记录并评估
      2. 有没有值得写 memex 卡片的洞察？
      3. 下次学习应该往哪个方向深入？
      4. 学习列表需要调整吗？
      执行：
      - 有洞察 → 写 memex 卡片
      - 有想法 → 更新 IDEAS.md
      - 记录到 memory/YYYY-MM-DD.md
    next: done

  done:
    task: |
      本轮学习完成。汇报学到了什么，对方向判断有什么影响。
    terminal: true
