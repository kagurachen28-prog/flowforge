name: review
description: "每日进化检查点 — 自检 + 写日志（3:00 AM）"
start: tool_review

nodes:
  tool_review:
    task: |
      工具进化 Review（异常优先，简洁输出）。
      1. 扫 workspace、cron、插件目录，列出所有工具
      2. 对每个工具快速判断：有问题？→ 详细写。没问题？→ 一行带过（"✅ 正常"）
      3. 只对有异常/变化/值得关注的工具展开五个问题：
         a. 还在用吗？ b. 好用吗？ c. 还需要吗？ d. 上游更新了吗？ e. 服务到位吗？
      4. 基本纪律：数据必须查、标注 [已验证/未验证]
      ⚠️ 目标：控制输出长度，为后续节点留 token 预算。正常的工具不需要长篇报告。
      ⚠️ 硬限制：本节点最终输出不超过 30 行。正常工具一行带过，只展开异常项。
    branches:
      - condition: "所有工具都逐个回答了五个问题"
        next: strategy_review

  strategy_review:
    task: |
      战略进化 Review。
      1. 读 wiki/strategy.md（完整内容，这是战略的唯一数据源）
      2. 读最近 2-3 天的 memory，提取 Luna 反复提到的主题和新发现
      3. 对比：战略跟实际行动有偏移吗？有新洞察该纳入吗？
      4. 如果有偏移或需要更新 → 直接编辑 wiki/strategy.md
      5. 同步更新 MEMORY.md 中的战略索引摘要
      6. 引用必须标注来源文件和原文，不要自己归纳后当成别人的话
    branches:
      - condition: "完成"
        next: dna_review

  dna_review:
    task: |
      DNA 进化 Review。
      1. beliefs-candidates.md 有重复 3 次以上该升级的吗？
      2. 过去 24h DNA 变更（git log），行为真的变了吗？
      3. DNA 文件之间一致吗？
      ⚠️ 计数纪律：所有数字必须附原始命令和输出。不可验证的标 [未验证]，不编来源不明的累计值。
    branches:
      - condition: "完成"
        next: memory_hygiene

  memory_hygiene:
    task: |
      MEMORY.md 记忆卫生（inspired by Claude Code Auto Dream）。
      读 MEMORY.md，执行三项清理：

      1. **去重**：有没有重复章节？（如"新项目"出现多次、同一信息不同位置写了两遍）
         - 合并到一处，删除重复
      2. **去旧**：有没有已被覆盖的旧数据？（如旧的打工成果统计、已退役的工具描述过长）
         - 删除旧版本，只留最新
         - 已暂停/退役的项目压缩到 1-2 行
      3. **归档**：有没有细节过多、该移到 wiki 的内容？
         - 项目的技术细节（功能列表、PR 历史）→ wiki/projects/
         - MEMORY.md 只留索引级描述

      ⚠️ 编辑文件时：先 read 获取精确内容，再 edit。不要凭记忆猜 oldText。
      每次改动都 git diff 确认，不要误删有价值的信息。
      不设硬行数上限——质量好就留，冗余了就清。
      汇报：清理了什么、删了多少行、现在多少行。
    branches:
      - condition: "完成"
        next: write_log

  write_log:
    task: |
      将 review 结果写入两个地方：
      1. evolution-log/当天日期.md — 完整记录（tool review + strategy review + dna review）
      2. memory/当天日期.md — 结论摘要

      ⚠️⚠️⚠️ 这是最重要的节点 — 写 memory 是这个 workflow 的核心产出。
      即使前面节点的输出很长、context 很满，你也**必须**至少写一条摘要到 memory/YYYY-MM-DD.md。
      宁可摘要只有 3 行，也不能 0 写入。不要空手而归。
      
      **最低要求（无论如何必须完成）：**
      用 exec 工具执行以下命令追加到 memory 文件（这比 edit 更可靠，不需要 oldText）：
      ```bash
      cat >> ~/.openclaw/workspace/memory/$(date +%Y-%m-%d).md << 'REVIEW_EOF'

      ## [Cron] daily-review (03:00)
      - 完成每日进化检查点（tool/strategy/dna/memory-hygiene review）
      - 结果已写入 evolution-log/
      REVIEW_EOF
      ```
      然后再补充具体发现。如果 context 不够写详细内容，至少上面这条必须写入。

      写文件时：先用 read 读取文件当前内容，再用 edit（确保 oldText 精确匹配）或 exec 追加。
      不要凭记忆猜测文件内容作为 oldText，这是 edit 失败的首要原因。

      **同时记录 eval 指标**（追加到 evolution-log/当天日期.md 末尾）：
      ```
      ## Eval Baseline
      - PR merge rate: X% (N merged / M total) — 来源: gogetajob stats [已验证]
      - beliefs-candidates total: N 条 — ⚠️ 必须用 awk 分段计数，禁止整文件 grep -c：
        ```bash
        awk '/^## /{section=$0} /^- [0-9]{4}-/{count[section]++; total++} END{for(s in count) print s, count[s]; print "TOTAL:", total}' beliefs-candidates.md
        ```
        报告格式：「N 条（§SectionA X 条 + §SectionB Y 条 + ...）」
      - wiki: cards N / projects N — ⚠️ 必须当场跑 `ls | wc -l`，不沿用旧数据：
        ```bash
        echo "cards: $(ls ~/.openclaw/workspace/wiki/cards/ | wc -l), projects: $(ls ~/.openclaw/workspace/wiki/projects/ | wc -l)"
        ```
      - Repeat gradients: N 条（beliefs-candidates.md 中标了 repeated 的）[已验证]
      - DNA graduations: N 次（累计从 candidates 升级到 DNA 的）[已验证]
      ```

      然后 cd ~/.openclaw/workspace/evolution-log && git add -A && git commit && git push

      ⚠️ 不要 spawn 子 agent。所有操作在当前 session 同步完成。
    terminal: true
