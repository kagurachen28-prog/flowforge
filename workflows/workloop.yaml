name: workloop
description: "打工循环 — 每轮先跟进已有工作，再找新活"
start: followup

nodes:
  followup:
    task: |
      用 gogetajob sync 检查所有已提交 PR 的状态。
      对每个有新 review comment 或 CI 失败的 PR，列出详情。
      重要：sync 结果出来后，每个标了需要处理的 PR 都要点进去看详情，
      区分真人 review 和 bot review（如 coderabbitai）。
      优先级：真人反馈 > CI 失败 > bot review（nitpick）。
      如果有需要处理的反馈，说明具体是哪个 PR、什么反馈、是真人还是 bot。
    branches:
      - condition: "有待处理的 review 或 CI 问题"
        next: handle_feedback
      - condition: "所有 PR 状态正常，没有待处理的"
        next: find_work

  handle_feedback:
    task: |
      处理上一步发现的 PR 反馈：
      1. 读 review 评论，理解要求
      2. 修改代码
      3. 跑测试确保通过
      4. 提交并 push
      5. 在 PR 上回复 reviewer
      处理完所有反馈后汇报结果。
    terminal: true

  find_work:
    task: |
      用 gogetajob scan --all 扫描所有活跃公司（公司列表从 gogetajob DB 读取，不硬编码）。
      用 gogetajob feed 查看可做的 issue。
      选择一个最有价值的 issue：优先选真实 bug > 测试覆盖 > 文档 > feature。
      确认没有竞争 PR。
      汇报选中的 issue 和理由。
    branches:
      - condition: "找到了合适的 issue"
        next: study
      - condition: "没有合适的 issue 可做"
        next: done

  study:
    task: |
      深入研究选中的项目和 issue：
      1. 先读 field-notes/projects/ 里对应的田野笔记（如果有的话），带着已有认知进入
      2. 读 CONTRIBUTING.md
      3. 理解相关代码模块的结构
      4. 确认 issue 的根因或需求
      5. 确认没有人在做同一个 issue
      6. 评估是否真的能在这个 repo 修（不是上游问题）
      汇报你的理解和实现计划。
    branches:
      - condition: "issue 可做，计划明确"
        next: implement
      - condition: "issue 不合适（上游问题/竞争PR/太复杂），需要重选"
        next: find_work

  implement:
    task: |
      按照 study 阶段的计划实现：
      1. 写代码
      2. 确保代码风格符合项目规范
      3. 跑所有测试，确保通过
      4. 提交，commit message 清晰
      汇报实现结果和测试状态。
    next: submit

  submit:
    task: |
      提交 PR：
      1. push 分支到 fork
      2. 创建 PR，标题清晰，描述写明改了什么、为什么、怎么测的
      3. 关联 issue（Closes #XX）
      用 gogetajob import 记录这个 PR。
      汇报 PR 链接。
    next: verify

  verify:
    task: |
      等 3-5 分钟，然后检查 PR 状态：
      1. CI 是否通过？
      2. 有没有自动化 review（CodeRabbit 等）？
      3. 如果有反馈，立即处理
      这一步不能跳过。做完所有检查后汇报结果。
    branches:
      - condition: "CI 通过，review 反馈已处理（或没有反馈）"
        next: reflect
      - condition: "有问题需要修改"
        next: implement

  reflect:
    task: |
      停下来反思本轮工作：
      1. 过程中有没有卡住的地方？为什么卡？怎么避免？
      2. 使用的工具（gogetajob、gh、flowforge 等）有没有问题？
         - 有 bug → 去工具 repo 提 issue 或自己修
         - 不好用 → 记下来，考虑改进
      3. 这个 workflow 本身需要调整吗？哪个节点可以优化？
      4. 有没有重复犯以前的错误？检查 memory 里记录的教训
      5. 下一轮可以怎么做得更好？
      6. **更新田野笔记**（field-notes/projects/对应项目.md）：
         - 新项目：创建笔记文件，记录架构、模式、第一印象
         - 已有项目：追加新发现，不重复已有内容
         - 重点记：架构洞察、坑、设计模式、代码质量、维护者风格
         - 不记 PR 编号和流水账，记学到了什么
         - git commit && git push 到 kagura-agent/field-notes
      把反思结果记到 memory/YYYY-MM-DD.md 里。
    next: done

  done:
    task: |
      这一轮工作完成。记录今天的工作到 memory 文件。
      汇报本轮成果。
    terminal: true
