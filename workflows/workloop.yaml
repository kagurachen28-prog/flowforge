name: workloop
description: "打工循环 — 每轮先跟进已有工作，再找新活"
start: followup

nodes:
  followup:
    task: |
      用 gogetajob sync 检查所有已提交 PR 的状态。
      对每个有新 review comment 或 CI 失败的 PR，列出详情。
      重要：sync 结果出来后，每个标了需要处理的 PR 都要点进去看详情，
      区分真人 review 和 bot review（如 coderabbitai）。
      优先级：真人反馈 > CI 失败 > bot review（nitpick）。
      如果有需要处理的反馈，说明具体是哪个 PR、什么反馈、是真人还是 bot。
    branches:
      - condition: "有待处理的 review 或 CI 问题"
        next: handle_feedback
      - condition: "所有 PR 状态正常，没有待处理的"
        next: find_work

  handle_feedback:
    task: |
      处理上一步发现的 PR 反馈：
      1. 读 review 评论，理解要求
      2. 修改代码
      3. 跑测试确保通过
      4. 提交并 push
      5. 在 PR 上回复 reviewer
      处理完所有反馈后汇报结果。
    terminal: true

  find_work:
    task: |
      用 gogetajob scan --all 扫描所有活跃公司（公司列表从 gogetajob DB 读取，不硬编码）。
      用 gogetajob feed 查看可做的 issue。
      选择一个最有价值的 issue：优先选真实 bug > 测试覆盖 > 文档 > feature。
      确认没有竞争 PR。
      汇报选中的 issue 和理由。
    branches:
      - condition: "找到了合适的 issue"
        next: study
      - condition: "没有合适的 issue 可做"
        next: reflect

  study:
    task: |
      深入研究选中的项目和 issue：
      1. **必须先读笔记**（不能跳过）：
         a. cat ~/.openclaw/workspace/knowledge-base/projects/<项目名>.md — 田野笔记
         b. cat ~/self-improving/projects/<项目名>.md 2>/dev/null — 执行改进笔记
         c. 如果两个文件都不存在，说明这是第一次打这个 repo，要特别小心
      2. **搜跨项目知识**（不能跳过）：
         a. 从 issue 标题/描述提取 2-3 个关键词
         b. cd ~/.openclaw/workspace/knowledge-base && MEMEX_HOME=. node ~/repos/forks/memex/dist/cli.js search --all "<关键词>"
         c. 搜到相关卡片 → 读一下，看有没有已有洞察能指导实现
         d. 没搜到 → 继续，不纠结
      3. **学习维护者**（从田野笔记读，不是现场查）：
         a. 田野笔记里应该已有维护者模式（reflect 时沉淀的）
         b. 如果笔记里没有，说明这是第一次打这个 repo——此时才去查最近 merged PR
         c. 注意：他们怎么写测试？怎么处理边界？PR 描述什么格式？
      3. 读 CONTRIBUTING.md
      4. 理解相关代码模块的结构
      5. 确认 issue 的根因或需求
      6. **查近期修复**：`git log --oneline -20 -- <相关文件>` 看有没有近期 commit 已经修了这个 issue
         - 如果发现已修但 issue 未关闭，在 issue 下评论指出，然后退回 find_work
      7. 确认没有人在做同一个 issue（检查 issue 下的关联 PR 和评论）
      8. 评估是否真的能在这个 repo 修（不是上游问题）
      9. **提 PR 前 5 问**（全过才提）：
         a. 这个 PR 只解决一个问题吗？
         b. 上游没有已有修复或竞争 PR 吗？
         c. 我读了 CONTRIBUTING.md 和最近的 merge 模式吗？
         d. 我能验证这个修复吗？
         e. 这个 repo 我的 open PR ≤ 3 吗？（超过就停，等已有 PR 被消化）
      汇报你的理解和实现计划，包含从笔记和维护者 PR 中学到的关键信息。
    branches:
      - condition: "issue 可做，计划明确"
        next: implement
      - condition: "issue 不合适（上游问题/竞争PR/太复杂），需要重选"
        next: find_work

  implement:
    task: |
      按照 study 阶段的计划实现：
      0. **分工决策**：
         - 代码实现用 acpx exec 同步调 Claude Code：
           `cd <repo> && /home/test/repo/openclaw/extensions/acpx/node_modules/.bin/acpx --approve-all claude exec "task"`
         - task 必须包含 Claude Code 看不到的上下文：
           a. 相关的 issue 讨论和 reviewer 反馈
           b. 类似 bug 的已有修复（可作为参考模式）
           c. 项目架构和代码位置的关键信息
           d. maintainer 偏好（从 knowledge-base 读）
         - **task 末尾必须加验证指令**：
           "Before committing: 1) grep for all test files that import/mock the interfaces you changed, update their mocks. 2) Run the project's test/lint commands. 3) git diff --stat to confirm no files were missed."
         - 一行级别的简单修复可以自己做，不需要调 Claude Code
      1. acpx exec 是同步的 — 等它跑完结果直接在 stdout 里
      2. Claude Code 完成后：检查他的 commit，review 改动是否正确
      3. 确保代码风格符合项目规范
      4. **push 前自检**（不能跳过）：
         a. `git diff --stat` 看全局影响
         b. 改了接口/类型？→ grep 所有 import 这个接口的文件，确认 mock/stub 同步了
         c. 项目有测试命令？→ 跑。没有本地环境？→ 至少 grep 验证 mock 完整性
      汇报实现结果和测试状态。
    next: submit

  submit:
    task: |
      提交 PR：
      1. push 分支到 fork
      2. 创建 PR，标题清晰，描述写明改了什么、为什么、怎么测的
      3. 关联 issue（Closes #XX）
      用 gogetajob import 记录这个 PR。
      汇报 PR 链接。
    next: verify

  verify:
    task: |
      等 3-5 分钟，然后检查 PR 状态：
      1. CI 是否通过？
      2. 有没有自动化 review（CodeRabbit 等）？
      3. 如果有反馈，立即处理
      这一步不能跳过。做完所有检查后汇报结果。
    branches:
      - condition: "CI 通过，review 反馈已处理（或没有反馈）"
        next: reflect
      - condition: "有问题需要修改"
        next: implement

  reflect:
    task: |
      反思本轮打工并**更新项目笔记**（不能跳过）：

      **第一步：更新田野笔记**（必须做）
      编辑 ~/.openclaw/workspace/knowledge-base/projects/<项目名>.md，追加：
      - 这次 PR 的结果（merged/pending/closed + 原因）
      - 维护者的 review 风格和偏好（新发现的）
      - **维护者 PR 模式**：他们怎么写测试、处理边界、描述 PR？（下次 study 要读这些）
      - CI/lint/测试的注意事项
      - 踩过的坑
      - 下次打这个 repo 该注意什么
      然后：cd ~/.openclaw/workspace/knowledge-base && git add -A && git commit -m "update: <项目名> field notes" && git push

      **第二步：Acontext distillation 反思**

      **成功分析**（什么有效）：
      - goal: 这轮要做什么？
      - approach: 什么方法有效？
      - key_decisions: 哪些选择起了作用？
      - pattern: 可复用的模式（选题策略、代码方法、沟通方式）
      - applies_when: 具体适用条件（哪个项目、什么类型的 issue）

      **失败分析**（哪里卡了）：
      - failure_point: 卡在哪？
      - flawed_reasoning: 错误假设
      - what_should_have_been_done: 正确做法
      - prevention_principle: 怎么防

      **沉淀分流**（三层，关键！所有笔记用 [[双链]] 互引）：
      - **项目级 pattern**（跟具体 repo/maintainer/CI 相关）→ knowledge-base/projects/项目名.md
        用 [[双链]] 引用相关项目笔记和概念卡片
        例：NemoClaw CI 慢要先本地 lint、gitclaw maintainer 偏好小 PR
      - **跨项目洞察**（多个项目对比出的规律、生态观察）→ memex 卡片
        写完后：cd ~/.openclaw/workspace/knowledge-base && git add -A && git commit -m "card: 卡片名" && git push
        例：TypeScript 项目普遍用 X 测试框架、大 repo 的 review 流程有 Y 共性
      - **行为级 pattern**（跨项目通用的工作方式）→ beliefs-candidates.md
        例：选 issue 前查竞争 PR、被 review 先理解再改
      不确定的先放 knowledge-base，重复出现再考虑升级。

      **工具检查**：
      - gogetajob、gh、flowforge 等有没有问题？
      - 有 bug → 去工具 repo 提 issue 或自己修

      把反思结果记到 memory/YYYY-MM-DD.md。
    next: done

  done:
    task: |
      这一轮工作完成。记录今天的工作到 memory 文件。
      汇报本轮成果。
    terminal: true
